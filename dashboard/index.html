<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MCBook 观测面板</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: #1a1a2e; color: #eee; }
    header { padding: 1rem 2rem; background: #16213e; border-bottom: 1px solid #0f3460; }
    h1 { margin: 0; font-size: 1.5rem; }
    main { padding: 1.5rem; max-width: 900px; margin: 0 auto; }
    .log { background: #0f0f1a; border-radius: 8px; padding: 1rem; font-family: monospace; font-size: 0.85rem; max-height: 60vh; overflow-y: auto; }
    .log-entry { margin: 0.25rem 0; padding: 0.25rem; border-left: 3px solid #0f3460; padding-left: 0.5rem; }
    .log-entry.action { border-color: #4ade80; }
    .log-entry.perception { border-color: #60a5fa; }
    .log-entry.event { border-color: #fbbf24; }
    .status { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 0.5rem; }
    .status.connected { background: #4ade80; }
    .status.disconnected { background: #ef4444; }
  </style>
</head>
<body>
  <header>
    <h1>MCBook 观测面板</h1>
    <p><span id="status" class="status disconnected"></span><span id="statusText">未连接</span></p>
  </header>
  <main>
    <h2>实时日志</h2>
    <div id="log" class="log"></div>
  </main>
  <script>
    const logEl = document.getElementById('log');
    const statusEl = document.getElementById('status');
    const statusTextEl = document.getElementById('statusText');
    const ws = new WebSocket(`ws://${location.host}`);
    ws.onopen = () => { statusEl.className = 'status connected'; statusTextEl.textContent = '已连接'; };
    ws.onclose = () => { statusEl.className = 'status disconnected'; statusTextEl.textContent = '已断开'; };
    ws.onmessage = (e) => {
      try {
        const d = JSON.parse(e.data);
        const entry = document.createElement('div');
        entry.className = `log-entry ${d.type || ''}`;
        entry.textContent = `[${new Date(d.ts).toLocaleTimeString()}] ${d.type} ${d.tool || ''} ${d.event ? JSON.stringify(d.event) : ''}`;
        logEl.appendChild(entry);
        logEl.scrollTop = logEl.scrollHeight;
      } catch {}
    };
  </script>
</body>
</html>
